name: "Cognitive Ability Benchmark"
version: "0.1.0"
description: "A comprehensive benchmark for evaluating cognitive abilities in AI models"
authors:
  - "kudosscience"
url: "https://github.com/kudosscience/cognitive-ability-benchmark"

tasks:
  - name: "few_shot_learning"
    category: "learning"
    description: "Evaluates whether a model can learn from a small number of examples in the prompt"
  - name: "in_context_learning"
    category: "learning"
    description: "Evaluates adaptation to new information provided in context"
  - name: "knowledge_transfer"
    category: "learning"
    description: "Evaluates the ability to apply knowledge from one domain to analogous problems in another"
  - name: "confidence_calibration"
    category: "metacognition"
    description: "Evaluates how well a model's stated confidence matches its actual accuracy"
  - name: "knowledge_boundary"
    category: "metacognition"
    description: "Tests if a model correctly identifies what it knows versus what it does not know"
  - name: "self_assessment"
    category: "metacognition"
    description: "Measures correlation between a model's self-assessment and its actual correctness"
  - name: "selective_attention"
    category: "attention"
    description: "Tests ability to focus on relevant information while ignoring distractors"
  - name: "sustained_attention"
    category: "attention"
    description: "Tests consistency of performance over a long sequence of items"
  - name: "divided_attention"
    category: "attention"
    description: "Tests ability to track multiple streams of information simultaneously"
  - name: "planning"
    category: "executive_functions"
    description: "Evaluates goal-directed planning and plan validity given available actions"
  - name: "cognitive_flexibility"
    category: "executive_functions"
    description: "Tests ability to switch between different rules or strategies"
  - name: "working_memory"
    category: "executive_functions"
    description: "Tests ability to maintain and manipulate information over a sequence"
  - name: "theory_of_mind"
    category: "social_cognition"
    description: "Tests understanding of others' mental states including beliefs, desires, and intentions"
  - name: "emotion_recognition"
    category: "social_cognition"
    description: "Tests ability to recognize emotional states from textual descriptions"
  - name: "perspective_taking"
    category: "social_cognition"
    description: "Tests ability to understand situations from different viewpoints"

evaluation:
  primary_metric: "composite_score"
  metrics:
    - name: "composite_score"
      description: "Weighted average across all cognitive ability categories (equal 0.2 weight each)"
    - name: "learning_score"
      description: "Average score across few-shot learning, in-context learning, and knowledge transfer tasks"
    - name: "metacognition_score"
      description: "Average score across confidence calibration, knowledge boundary, and self-assessment tasks"
    - name: "attention_score"
      description: "Average score across selective attention, sustained attention, and divided attention tasks"
    - name: "executive_functions_score"
      description: "Average score across planning, cognitive flexibility, and working memory tasks"
    - name: "social_cognition_score"
      description: "Average score across theory of mind, emotion recognition, and perspective taking tasks"
